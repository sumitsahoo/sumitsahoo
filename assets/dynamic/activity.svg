<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="168" viewBox="0 0 1000 168" fill="none" role="img" aria-label="GitHub activity for sumitsahoo">
  <style>
    :root {
      --bg: #ffffff;
      --border: #d0d7de;
      --title: #1f2328;
      --value: #1f2328;
      --label: #656d76;
      --divider: #d8dee4;
      --bar: #588DF3;
      --track: #eef2f7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --border: #30363d;
        --title: #e6edf3;
        --value: #e6edf3;
        --label: #8b949e;
        --divider: #21262d;
        --bar: #588DF3;
        --track: #161b22;
      }
    }
    .card { fill: var(--bg); stroke: var(--border); }
    .stat-value { fill: var(--value); font: 700 26px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; }
    .stat-label { fill: var(--label); font: 400 12px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; letter-spacing: .3px; }
    .divider { stroke: var(--divider); stroke-width: 1; }
    .spark-label { fill: var(--label); font: 400 11px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; }
  </style>

  <rect class="card" x="1" y="1" width="998" height="166" rx="16" stroke-width="1.5" />

